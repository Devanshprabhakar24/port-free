<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Header -->
  <rect width="800" height="60" fill="#ffffff"/>
  
  <!-- Logo -->
  <rect x="20" y="15" width="40" height="30" rx="5" fill="#0ea5e9"/>
  <text x="70" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">MyLaundry</text>
  
  <!-- Nav items -->
  <text x="250" y="38" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Services</text>
  <text x="330" y="38" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Subscriptions</text>
  <text x="450" y="38" font-family="Arial, sans-serif" font-size="14" fill="#64748b">How It Works</text>
  <text x="570" y="38" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Contact</text>
  
  <!-- Sign Up Button -->
  <rect x="700" y="15" width="80" height="30" rx="5" fill="#0ea5e9"/>
  <text x="720" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Sign Up</text>
  
  <!-- Hero Section -->
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1e293b" text-anchor="middle">The Easiest Way to</text>
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0ea5e9" text-anchor="middle">Do Your Laundry</text>
  
  <!-- Subtitle -->
  <text x="400" y="240" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Premium washing, folding, and dry cleaning delivered to your door.</text>
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Say goodbye to laundry day and hello to more free time.</text>
  
  <!-- Buttons -->
  <rect x="280" y="290" width="140" height="40" rx="5" fill="#0ea5e9"/>
  <text x="350" y="317" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Schedule a Pickup</text>
  
  <rect x="440" y="290" width="120" height="40" rx="5" fill="none" stroke="#0ea5e9" stroke-width="2"/>
  <text x="500" y="317" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0ea5e9" text-anchor="middle">View Pricing</text>
  
  <!-- Feature Card -->
  <rect x="200" y="360" width="400" height="120" rx="10" fill="#ffffff" opacity="0.9"/>
  
  <!-- Washing Machine Icon -->
  <circle cx="400" cy="400" r="25" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="400" cy="400" r="18" fill="none" stroke="#0ea5e9" stroke-width="3"/>
  <circle cx="400" cy="400" r="8" fill="#0ea5e9"/>
  
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Clean, folded laundry delivered to your door</text>
</svg>
