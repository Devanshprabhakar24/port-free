<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="darkBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#darkBg2)"/>
  
  <!-- Header -->
  <rect width="800" height="60" fill="rgba(15,15,30,0.8)"/>
  
  <!-- Logo -->
  <text x="100" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8b5cf6">Scatch</text>
  
  <!-- Navigation -->
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Shop</text>
  <text x="360" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">About</text>
  <text x="430" y="38" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Contact</text>
  
  <!-- Dark Mode Toggle -->
  <circle cx="650" cy="30" r="12" fill="#374151"/>
  
  <!-- Search Icon -->
  <circle cx="690" cy="30" r="12" fill="none" stroke="#9ca3af" stroke-width="2"/>
  
  <!-- Login Button -->
  <rect x="720" y="18" width="60" height="28" rx="5" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <text x="750" y="36" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Login</text>
  
  <!-- Register Button -->
  <rect x="790" y="18" width="70" height="28" rx="5" fill="url(#purpleGrad)"/>
  <text x="825" y="36" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Register</text>
  
  <!-- Premium Badge -->
  <circle cx="460" cy="90" r="4" fill="#10b981"/>
  <text x="470" y="94" font-family="Arial, sans-serif" font-size="12" fill="#10b981">Premium Quality Products</text>
  
  <!-- Hero Title -->
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">Welcome to</text>
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Scatch</text>
  
  <!-- Subtitle -->
  <text x="400" y="235" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Discover premium bags and accessories crafted with passion. Elevate</text>
  <text x="400" y="255" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">your style with our exclusive collection.</text>
  
  <!-- Auth Cards Container -->
  <g transform="translate(120, 280)">
    <!-- Create Account Card -->
    <rect width="260" height="200" rx="12" fill="rgba(30,30,45,0.8)"/>
    <rect width="260" height="200" rx="12" fill="none" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    
    <!-- Icon -->
    <circle cx="40" cy="35" r="20" fill="#8b5cf6"/>
    <text x="40" y="43" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">👤</text>
    
    <!-- Title -->
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Create Account</text>
    <text x="70" y="52" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Join our community</text>
    
    <!-- Input Fields -->
    <rect x="20" y="75" width="220" height="35" rx="5" fill="rgba(15,15,30,0.6)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <text x="35" y="97" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">👤 Full Name</text>
    
    <rect x="20" y="120" width="220" height="35" rx="5" fill="rgba(15,15,30,0.6)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <text x="35" y="142" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">✉️ Email Address</text>
    
    <!-- Create Button -->
    <rect x="20" y="165" width="220" height="35" rx="8" fill="url(#purpleGrad)"/>
    <text x="130" y="187" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Create Account →</text>
  </g>
  
  <!-- Welcome Back Card -->
  <g transform="translate(420, 280)">
    <rect width="260" height="200" rx="12" fill="rgba(30,30,45,0.8)"/>
    <rect width="260" height="200" rx="12" fill="none" stroke="rgba(236,72,153,0.3)" stroke-width="1"/>
    
    <!-- Icon -->
    <circle cx="40" cy="35" r="20" fill="#ec4899"/>
    <text x="40" y="43" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">🔓</text>
    
    <!-- Title -->
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Welcome Back</text>
    <text x="70" y="52" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Login to your account</text>
    
    <!-- Input Fields -->
    <rect x="20" y="75" width="220" height="35" rx="5" fill="rgba(15,15,30,0.6)" stroke="rgba(236,72,153,0.3)" stroke-width="1"/>
    <text x="35" y="97" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">✉️ Email Address</text>
    
    <rect x="20" y="120" width="220" height="35" rx="5" fill="rgba(15,15,30,0.6)" stroke="rgba(236,72,153,0.3)" stroke-width="1"/>
    <text x="35" y="142" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">🔒 Password</text>
    
    <!-- Remember Me -->
    <rect x="20" y="162" width="12" height="12" rx="2" fill="none" stroke="#6b7280" stroke-width="1"/>
    <text x="38" y="171" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">Remember me</text>
    
    <text x="240" y="171" font-family="Arial, sans-serif" font-size="10" fill="#ec4899" text-anchor="end">Forgot password?</text>
    
    <!-- Sign In Button -->
    <rect x="20" y="180" width="220" height="35" rx="8" fill="url(#pinkGrad)"/>
    <text x="130" y="202" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Sign In →</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="450" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="750" cy="100" r="2" fill="#ec4899" opacity="0.4"/>
  <circle cx="100" cy="250" r="2" fill="#a78bfa" opacity="0.3"/>
</svg>
