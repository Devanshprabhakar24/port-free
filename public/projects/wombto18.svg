<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <rect width="400" height="300" fill="url(#womb-gradient)"/>
  <defs>
    <linearGradient id="womb-gradient" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#f093fb"/>
    </linearGradient>
  </defs>
  
  <!-- Decorative Circles -->
  <circle cx="50" cy="50" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="350" cy="250" r="40" fill="rgba(255,255,255,0.1)"/>
  <circle cx="320" cy="60" r="25" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Baby Icon -->
  <g transform="translate(80, 80)">
    <!-- Head -->
    <circle cx="50" cy="40" r="35" fill="white" opacity="0.9"/>
    <!-- Body -->
    <ellipse cx="50" cy="100" rx="30" ry="40" fill="white" opacity="0.9"/>
    <!-- Arms -->
    <ellipse cx="25" cy="90" rx="12" ry="25" fill="white" opacity="0.9" transform="rotate(-20 25 90)"/>
    <ellipse cx="75" cy="90" rx="12" ry="25" fill="white" opacity="0.9" transform="rotate(20 75 90)"/>
    <!-- Legs -->
    <ellipse cx="35" cy="135" rx="10" ry="20" fill="white" opacity="0.9"/>
    <ellipse cx="65" cy="135" rx="10" ry="20" fill="white" opacity="0.9"/>
    <!-- Face -->
    <circle cx="42" cy="35" r="4" fill="#667eea"/>
    <circle cx="58" cy="35" r="4" fill="#667eea"/>
    <path d="M 40 48 Q 50 52 60 48" stroke="#667eea" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Health Cross -->
  <g transform="translate(220, 100)">
    <rect x="35" y="10" width="20" height="70" rx="5" fill="white" opacity="0.9"/>
    <rect x="10" y="35" width="70" height="20" rx="5" fill="white" opacity="0.9"/>
    <circle cx="45" cy="45" r="8" fill="#10b981"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">
    WombTo18
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="245" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    Complete Child Health Journey
  </text>
  
  <!-- Age Range -->
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981" text-anchor="middle">
    0-18 Years
  </text>
</svg>
